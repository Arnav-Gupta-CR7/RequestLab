<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Postman Lite // Wireframe</title>
    <style>
      :root {
        --bg-color: #0f1115;
        --panel-bg: #161b22;
        --border-color: #30363d;
        --text-color: #c9d1d9;
        --text-muted: #8b949e;
        --accent-color: #58a6ff;
        --accent-hover: #1f6feb;
        --success-color: #3fb950;
        --font-mono: "Courier New", Courier, monospace;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        font-size: 14px;
        line-height: 1.5;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 12px 20px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-family: var(--font-mono);
        font-weight: bold;
        letter-spacing: 1px;
      }

      .app-container {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .sidebar {
        width: 260px;
        border-right: 1px solid var(--border-color);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .sidebar-title {
        font-family: var(--font-mono);
        text-transform: uppercase;
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 1px;
      }

      .history-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
        overflow-y: auto;
      }

      .history-item {
        padding: 8px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        cursor: pointer;
        font-family: var(--font-mono);
        font-size: 12px;
        display: flex;
        gap: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .history-item:hover {
        background-color: var(--panel-bg);
      }

      .history-item .method {
        font-weight: bold;
        color: var(--accent-color);
      }

      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 20px;
        gap: 20px;
      }

      .request-bar {
        display: flex;
        gap: 10px;
      }

      select,
      input,
      button,
      textarea {
        background-color: var(--panel-bg);
        border: 1px solid var(--border-color);
        color: var(--text-color);
        padding: 10px 14px;
        border-radius: 4px;
        outline: none;
        font-size: 14px;
      }

      select {
        cursor: pointer;
        font-family: var(--font-mono);
      }

      input[type="text"] {
        flex: 1;
        font-family: var(--font-mono);
      }

      input[type="text"]:focus,
      select:focus,
      textarea:focus {
        border-color: var(--accent-color);
      }

      button {
        background-color: var(--accent-color);
        color: #ffffff;
        font-weight: bold;
        cursor: pointer;
        border: none;
      }

      button:hover {
        background-color: var(--accent-hover);
      }

      .workspace {
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background-color: var(--panel-bg);
      }

      .tabs {
        display: flex;
        border-bottom: 1px solid var(--border-color);
      }

      .tab {
        padding: 10px 20px;
        cursor: pointer;
        border-right: 1px solid var(--border-color);
        font-family: var(--font-mono);
        font-size: 12px;
      }

      .tab.active {
        background-color: var(--bg-color);
        border-bottom: 2px solid var(--accent-color);
      }

      .tab-content {
        padding: 16px;
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      textarea {
        width: 100%;
        height: 150px;
        font-family: var(--font-mono);
        resize: vertical;
      }

      .response-area {
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background-color: var(--panel-bg);
        display: flex;
        flex-direction: column;
        min-height: 250px;
      }

      .response-header {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .meta-info {
        display: flex;
        gap: 15px;
        font-family: var(--font-mono);
        font-size: 12px;
      }

      .status-badge {
        color: var(--success-color);
        font-weight: bold;
      }

      .response-body {
        padding: 16px;
        overflow-x: auto;
        flex: 1;
      }

      pre {
        font-family: var(--font-mono);
        font-size: 13px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">// POSTMAN_LITE</div>
      <div style="font-size: 12px; color: var(--text-muted)">
        Wireframe v1.0
      </div>
    </header>

    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-title">Quick presets</div>
        <ul class="history-list">
          <li
            class="history-item"
            onclick="loadPreset('GET', 'http://localhost:3000/api/test')"
          >
            <span class="method">GET</span> <span>Local Demo</span>
          </li>
          <li
            class="history-item"
            onclick="loadPreset('POST', 'http://localhost:3000/api/test')"
          >
            <span class="method">POST</span> <span>Local Demo</span>
          </li>
          <li
            class="history-item"
            onclick="
              loadPreset('GET', 'https://jsonplaceholder.typicode.com/todos/1')
            "
          >
            <span class="method">GET</span> <span>Placeholder API</span>
          </li>
        </ul>
      </aside>

      <main class="main-content">
        <div class="request-bar">
          <select id="method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
          </select>
          <input
            type="text"
            id="url"
            placeholder="Enter request URL (e.g., http://localhost:3000/api/test)"
            value="http://localhost:3000/api/test"
          />
          <button onclick="sendRequest()">SEND</button>
        </div>

        <div class="workspace">
          <div class="tabs">
            <div class="tab active" onclick="switchTab(event, 'body-tab')">
              Body (JSON)
            </div>
            <div class="tab" onclick="switchTab(event, 'headers-tab')">
              Headers
            </div>
          </div>

          <div id="body-tab" class="tab-content active">
            <textarea id="req-body" placeholder='{ "key": "value" }'></textarea>
          </div>

          <div id="headers-tab" class="tab-content">
            <textarea
              id="req-headers"
              placeholder='{ "Content-Type": "application/json" }'
            ></textarea>
          </div>
        </div>

        <div class="response-area">
          <div class="response-header">
            <span
              style="
                font-family: var(--font-mono);
                font-size: 12px;
                font-weight: bold;
              "
              >RESPONSE</span
            >
            <div class="meta-info">
              <span
                >Status:
                <span id="res-status" class="status-badge">--</span></span
              >
              <span>Time: <span id="res-time">--</span></span>
            </div>
          </div>
          <div class="response-body">
            <pre id="res-output" style="color: var(--text-muted)">
Send a request to view response...</pre
            >
          </div>
        </div>
      </main>
    </div>

    <script>
      function switchTab(event, tabId) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.remove("active"));

        event.target.classList.add("active");
        document.getElementById(tabId).classList.add("active");
      }

      function loadPreset(method, url) {
        document.getElementById("method").value = method;
        document.getElementById("url").value = url;
        if (method === "POST") {
          document.getElementById("req-body").value = JSON.stringify(
            { name: "Tester", role: "Developer" },
            null,
            2,
          );
        } else {
          document.getElementById("req-body").value = "";
        }
      }

      async function sendRequest() {
        const url = document.getElementById("url").value;
        const method = document.getElementById("method").value;
        const bodyInput = document.getElementById("req-body").value;
        const headersInput = document.getElementById("req-headers").value;
        const resOutput = document.getElementById("res-output");
        const resStatus = document.getElementById("res-status");
        const resTime = document.getElementById("res-time");

        resOutput.textContent = "Loading...";
        resOutput.style.color = "var(--text-color)";

        let body = null;
        if (bodyInput && method !== "GET") {
          try {
            body = JSON.parse(bodyInput);
          } catch (e) {
            resOutput.textContent = "Error: Invalid request JSON Body format.";
            resOutput.style.color = "#ff6b6b";
            return;
          }
        }

        let headers = { "Content-Type": "application/json" };
        if (headersInput) {
          try {
            headers = { ...headers, ...JSON.parse(headersInput) };
          } catch (e) {
            resOutput.textContent =
              "Error: Invalid request JSON Headers format.";
            resOutput.style.color = "#ff6b6b";
            return;
          }
        }

        try {
          const response = await fetch("/api/proxy", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url, method, headers, body }),
          });

          const result = await response.json();

          if (response.ok) {
            resStatus.textContent = `${result.status} ${result.statusText || ""}`;
            resTime.textContent = result.time;

            if (result.status >= 400) {
              resStatus.style.color = "#f85149";
            } else {
              resStatus.style.color = "var(--success-color)";
            }

            resOutput.textContent = JSON.stringify(result.data, null, 2);
          } else {
            throw new Error(result.error || "Failed execution");
          }
        } catch (error) {
          resStatus.textContent = "Error";
          resStatus.style.color = "#f85149";
          resTime.textContent = "--";
          resOutput.textContent = `Request Failed:\n${error.message}`;
        }
      }
    </script>
  </body>
</html>
